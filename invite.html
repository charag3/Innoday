<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>INNODAYS AMXRICAS 2026 — Invitación</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --orange: #E8602C;
      --pink:   #E8407A;
      --red:    #C0192B;
      --black:  #0c0c0c;
      --off-white: #F5F0EB;
      --muted:  #9a8f87;
    }

    body {
      background: #000;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Montserrat', sans-serif;
      padding: 2rem;
    }

    /* ── CARD ── */
    .card {
      width: 420px;
      max-width: 100%;
      box-shadow: 0 40px 100px rgba(0,0,0,0.8);
      display: flex;
      flex-direction: column;
    }

    /* Photo — full, no overlay, no text */
    .card-photo {
      display: block;
      width: 100%;
      aspect-ratio: 3 / 4;
      object-fit: cover;
      object-position: center top;
    }

    /* ── PLECA ── */
    .pleca {
      background: var(--black);
      padding: 1.6rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      border-top: 3px solid transparent;
      border-image: linear-gradient(to right, var(--red), var(--orange), var(--pink)) 1;
    }

    /* CTA */
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: var(--orange);
      color: var(--black);
      text-decoration: none;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 0.9rem 1.4rem;
      transition: background 0.2s ease;
      white-space: nowrap;
      flex: 1;
      justify-content: center;
    }

    .cta-btn:hover { background: var(--pink); }

    /* QR */
    .qr-block {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.45rem;
      flex-shrink: 0;
    }

    .qr-wrap {
      background: var(--off-white);
      padding: 5px;
      width: 68px;
      height: 68px;
    }

    .qr-wrap canvas,
    .qr-wrap img {
      width: 58px !important;
      height: 58px !important;
      display: block;
    }

    .qr-label {
      font-size: 0.45rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="card">

    <!-- Imagen limpia — los datos ya vienen en la foto -->
    <img class="card-photo" src="./hero.jpeg" alt="Innodays Amxricas 2026">

    <!-- Pleca: solo acciones -->
    <div class="pleca">
      <a class="cta-btn" href="#" id="rsvp-link">
        Confirmar asistencia &nbsp;→
      </a>
      <div class="qr-block">
        <div class="qr-wrap" id="qrcode"></div>
        <div class="qr-label">Escanear<br>para RSVP</div>
      </div>
    </div>

  </div>

  <script>
    const RSVP_URL = 'PLACEHOLDER_RSVP_URL';

    document.getElementById('rsvp-link').href = RSVP_URL;

    new QRCode(document.getElementById('qrcode'), {
      text: RSVP_URL,
      width: 58,
      height: 58,
      colorDark: '#0c0c0c',
      colorLight: '#F5F0EB',
      correctLevel: QRCode.CorrectLevel.M
    });
  </script>

</body>
</html>
